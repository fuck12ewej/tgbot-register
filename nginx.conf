# Nginx конфигурация для Telegram бота
# Пример конфигурации для настройки веб-сервера

server {
    listen 80;
    listen [::]:80;
    
    # Перенаправление на HTTPS (раскомментируйте при использовании SSL)
    # return 301 https://$server_name$request_uri;
    
    server_name yourdomain.com www.yourdomain.com;
    root /var/www/telegram-bot;
    index main.php;
    
    # Основные настройки безопасности
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    
    # Обработка PHP файлов
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
        fastcgi_index main.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        
        # Настройки для обработки больших запросов
        fastcgi_read_timeout 300;
        fastcgi_connect_timeout 300;
        fastcgi_send_timeout 300;
        
        # Настройки буферизации
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }
    
    # Защита конфигурационных файлов
    location ~ /(config\.php|\.htaccess|\.env)$ {
        deny all;
        return 404;
    }
    
    # Защита временных файлов и логов
    location ~ /(temp/|logs/|\.log$|\.sql$|\.bak$)$ {
        deny all;
        return 404;
    }
    
    # Обработка главной страницы бота
    location = / {
        try_files $uri /main.php;
    }
    
    # Обработка webhook для Telegram
    location = /main.php {
        try_files $uri =404;
        fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
        fastcgi_index main.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/main.php;
        
        # Специальные настройки для Telegram webhook
        fastcgi_read_timeout 60;
        fastcgi_connect_timeout 60;
        fastcgi_send_timeout 60;
    }
    
    # Обработка подтверждения email
    location = /email_verify.php {
        try_files $uri =404;
        fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
        fastcgi_index email_verify.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/email_verify.php;
    }
    
    # Кэширование статических файлов
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # Сжатие файлов
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;
    
    # Ограничение размера запросов
    client_max_body_size 10M;
    
    # Настройки таймаутов
    client_body_timeout 60s;
    client_header_timeout 60s;
    keepalive_timeout 65s;
    send_timeout 60s;
    
    # Логирование
    access_log /var/log/nginx/telegram-bot.access.log;
    error_log /var/log/nginx/telegram-bot.error.log;
    
    # Обработка 404 ошибок
    error_page 404 /404.html;
    
    # Настройки для robots.txt
    location = /robots.txt {
        allow all;
        log_not_found off;
        access_log off;
    }
    
    # Запрет доступа к скрытым файлам
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

